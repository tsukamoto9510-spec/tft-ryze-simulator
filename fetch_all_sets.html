<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TFT 全セットデータ生成ツール</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 1000px; margin: 0 auto; }
        h1 { color: #f0e6d2; }
        .status { padding: 15px; background: #16213e; border-radius: 8px; margin: 10px 0; }
        .status.ok { border-left: 4px solid #4caf50; }
        .status.error { border-left: 4px solid #f44336; }
        .status.loading { border-left: 4px solid #ff9800; }
        button { padding: 12px 24px; font-size: 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; }
        .set-output { margin: 15px 0; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        .set-header { background: #16213e; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .set-header h3 { margin: 0; color: #f0e6d2; }
        textarea { width: 100%; height: 200px; background: #0f0f1a; color: #ddd; border: none; padding: 10px; font-family: monospace; font-size: 12px; resize: vertical; box-sizing: border-box; }
        .copy-btn { background: #4caf50; padding: 6px 12px; font-size: 13px; }
        .dl-btn { background: #ff9800; padding: 6px 12px; font-size: 13px; }
        #downloadAll { background: #e91e63; font-size: 18px; padding: 15px 30px; }
        .info { font-size: 0.9em; color: #888; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>🎮 TFT 全セットデータ生成ツール</h1>
    <p class="info">Community Dragon（公開CDN）から1回だけデータを取得し、シミュレーター用のJSファイルを生成します。</p>
    
    <button id="fetchBtn" onclick="startFetch()">📥 データ取得開始（2リクエスト）</button>
    <button id="downloadAll" style="display:none;" onclick="downloadAllFiles()">💾 全ファイルを一括ダウンロード</button>
    
    <div id="statusArea"></div>
    <div id="outputArea"></div>

<script>
const EN_URL = 'https://raw.communitydragon.org/latest/cdragon/tft/en_us.json';
const JA_URL = 'https://raw.communitydragon.org/latest/cdragon/tft/ja_jp.json';

// Traits to exclude (unique per-champion traits that only have 1 unit)
function isUniqueTrait(trait) {
    if (!trait.effects || trait.effects.length === 0) return true;
    // A unique trait typically has style=4 and minUnits=1, maxUnits=25000 (or similar) with only 1 tier
    if (trait.effects.length === 1 && trait.effects[0].minUnits === 1) return true;
    return false;
}

function addStatus(msg, type = 'loading') {
    const div = document.createElement('div');
    div.className = `status ${type}`;
    div.textContent = msg;
    document.getElementById('statusArea').appendChild(div);
    return div;
}

function extractTraitRules(trait) {
    // Extract thresholds: the minUnits from each tier
    const thresholds = [];
    for (const eff of trait.effects) {
        if (eff.minUnits && eff.minUnits < 25000) {
            thresholds.push(eff.minUnits);
        }
    }
    return thresholds;
}

function getTraitKey(apiName) {
    // Convert "TFT17_HPTank" -> "HPTank", "TFT3_Rebel" -> "Rebel"
    return apiName.replace(/^TFT\d+_/, '');
}

function generateSetData(setInfo, jaSetInfo, setNum) {
    const enTraits = setInfo.traits || [];
    const jaTraits = jaSetInfo ? (jaSetInfo.traits || []) : [];
    const enChamps = setInfo.champions || [];
    const jaChamps = jaSetInfo ? (jaSetInfo.champions || []) : [];
    
    // Build Japanese trait name map by apiName
    const jaTraitNameMap = {};
    jaTraits.forEach(t => { jaTraitNameMap[t.apiName] = t.name; });
    
    // Build Japanese champion name map by apiName
    const jaChampNameMap = {};
    jaChamps.forEach(c => { jaChampNameMap[c.apiName] = c.name; });
    
    // Filter to non-unique traits only
    const activeTraits = enTraits.filter(t => !isUniqueTrait(t));
    
    // Build traitMap and traitRules
    const traitMap = {};
    const traitRules = {};
    const validTraitKeys = new Set();
    
    activeTraits.forEach(t => {
        const key = getTraitKey(t.apiName);
        const enName = t.name;
        const jaName = jaTraitNameMap[t.apiName] || enName;
        
        // Format: "日本語名（English Name）"
        if (jaName !== enName) {
            traitMap[key] = `${jaName}（${enName}）`;
        } else {
            traitMap[key] = enName;
        }
        
        traitRules[key] = extractTraitRules(t);
        validTraitKeys.add(t.apiName);
    });
    
    // Build champions array
    const champions = [];
    const validTraitApiNames = new Set(activeTraits.map(t => t.apiName));
    
    enChamps.forEach(c => {
        // Filter champion traits to only include valid (non-unique) traits
        const champTraitKeys = (c.traits || [])
            .filter(tApiName => validTraitApiNames.has(tApiName))
            .map(tApiName => getTraitKey(tApiName));
        
        // Skip champions with no valid traits
        if (champTraitKeys.length === 0) return;
        
        const enName = c.name;
        const jaName = jaChampNameMap[c.apiName] || enName;
        const displayName = (jaName !== enName) ? `${jaName}（${enName}）` : enName;
        
        const champObj = {
            name: displayName,
            traits: champTraitKeys,
            cost: c.cost
        };
        
        champions.push(champObj);
    });
    
    // Sort by cost, then name
    champions.sort((a, b) => a.cost - b.cost || a.name.localeCompare(b.name, 'ja'));
    
    return { traitMap, traitRules, champions };
}

function formatAsJS(varName, data) {
    const tm = JSON.stringify(data.traitMap, null, 2);
    const tr = JSON.stringify(data.traitRules, null, 2);
    
    // Format champions more compactly
    const champLines = data.champions.map(c => {
        return `  ${JSON.stringify(c)}`;
    }).join(',\n');
    
    return `const ${varName} = {
  traitMap: ${tm},
  traitRules: ${tr},
  champions: [
${champLines}
  ]
};
`;
}

let generatedFiles = {};

async function startFetch() {
    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    btn.textContent = '取得中...';
    
    const statusArea = document.getElementById('statusArea');
    const outputArea = document.getElementById('outputArea');
    statusArea.innerHTML = '';
    outputArea.innerHTML = '';
    generatedFiles = {};
    
    try {
        // Fetch English data
        const s1 = addStatus('📡 英語データ取得中（1/2）...', 'loading');
        const enRes = await fetch(EN_URL);
        const enData = await enRes.json();
        s1.textContent = '✅ 英語データ取得完了';
        s1.className = 'status ok';
        
        // Fetch Japanese data
        const s2 = addStatus('📡 日本語データ取得中（2/2）...', 'loading');
        const jaRes = await fetch(JA_URL);
        const jaData = await jaRes.json();
        s2.textContent = '✅ 日本語データ取得完了';
        s2.className = 'status ok';
        
        addStatus('✅ 全リクエスト完了。以降ネットワークアクセスなし。', 'ok');
        
        // Parse sets
        const enSets = enData.sets || enData.setData || [];
        const jaSets = jaData.sets || jaData.setData || [];
        
        const s3 = addStatus(`🔍 ${Array.isArray(enSets) ? enSets.length : Object.keys(enSets).length} セットを検出...`, 'loading');
        
        // Build ja lookup by set number
        const jaSetMap = {};
        if (Array.isArray(jaSets)) {
            jaSets.forEach(s => { jaSetMap[s.number] = s; });
        } else {
            for (const [k, v] of Object.entries(jaSets)) { jaSetMap[v.number || k] = v; }
        }
        
        // Process each set
        const setsArray = Array.isArray(enSets) ? enSets : Object.values(enSets);
        
        setsArray.forEach(setInfo => {
            const setNum = setInfo.number;
            if (setNum === undefined || setNum === null) return;
            
            const jaSet = jaSetMap[setNum];
            const setName = setInfo.name || `Set ${setNum}`;
            
            try {
                const data = generateSetData(setInfo, jaSet, setNum);
                const padNum = String(setNum).padStart(2, '0');
                const varName = `SET${setNum}_DATA`;
                const jsContent = formatAsJS(varName, data);
                const fileName = `data_set${padNum}.js`;
                
                generatedFiles[fileName] = {
                    content: jsContent,
                    setNum: setNum,
                    setName: setName,
                    champCount: data.champions.length,
                    traitCount: Object.keys(data.traitMap).length
                };
                
                // Create output UI
                const container = document.createElement('div');
                container.className = 'set-output';
                container.innerHTML = `
                    <div class="set-header">
                        <h3>Set ${setNum}: ${setName} (${data.champions.length}チャンピオン / ${Object.keys(data.traitMap).length}特性)</h3>
                        <div>
                            <button class="copy-btn" onclick="copyText('ta_${padNum}')">📋 コピー</button>
                            <button class="dl-btn" onclick="downloadFile('${fileName}')">💾 DL</button>
                        </div>
                    </div>
                    <textarea id="ta_${padNum}" readonly>${jsContent}</textarea>
                `;
                outputArea.appendChild(container);
                
            } catch (e) {
                addStatus(`⚠️ Set ${setNum} の処理でエラー: ${e.message}`, 'error');
            }
        });
        
        s3.textContent = `✅ ${Object.keys(generatedFiles).length} セットのデータ生成完了！`;
        s3.className = 'status ok';
        
        document.getElementById('downloadAll').style.display = 'inline-block';
        btn.textContent = '✅ 完了';
        
    } catch(e) {
        addStatus(`❌ エラー: ${e.message}`, 'error');
        btn.disabled = false;
        btn.textContent = '📥 再試行';
    }
}

function copyText(id) {
    const ta = document.getElementById(id);
    ta.select();
    document.execCommand('copy');
    // Brief visual feedback
    const btn = ta.parentElement.querySelector('.copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✅ コピー済み';
    setTimeout(() => btn.textContent = orig, 1500);
}

function downloadFile(fileName) {
    const info = generatedFiles[fileName];
    if (!info) return;
    const blob = new Blob([info.content], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
}

function downloadAllFiles() {
    for (const fileName of Object.keys(generatedFiles).sort()) {
        downloadFile(fileName);
    }
}
</script>
</body>
</html>
